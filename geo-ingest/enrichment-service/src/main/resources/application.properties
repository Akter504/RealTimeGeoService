spring.application.name=enrichment-service

spring.kafka.consumer.group-id=enrichment-geo-data

spring.kafka.consumer.topic-in=deduplication-stations

spring.kafka.consumer.topic-out=enrichment-stations
spring.kafka.consumer.topic.partitions=5
spring.kafka.consumer.topic.replicas=1

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.auto-offset-reset=earliest
spring.kafka.default-topic=base-station

logging.level.ru.java.maryan=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.springframework=INFO