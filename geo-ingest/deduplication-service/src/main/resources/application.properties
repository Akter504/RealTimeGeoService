spring.application.name=deduplication-service

spring.kafka.consumer.group-id=deduplication-geo-data

spring.kafka.consumer.topic-in=filter-stations

spring.kafka.consumer.topic-out=deduplication-stations
spring.kafka.consumer.topic.partitions=5
spring.kafka.consumer.topic.replicas=1

spring.redis.ttl=PT10M

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.auto-offset-reset=earliest
spring.kafka.default-topic=base-station

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{imsi}] [%thread] %logger{36} - %msg%n

logging.level.ru.java.maryan=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.springframework=INFO