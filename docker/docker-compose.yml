networks:
  geo-network:
    driver: bridge

volumes:
  pg_data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [geo-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [geo-network]
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka

  kafka-jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: kafka-jmx-exporter
    networks: [ geo-network ]
    ports:
      - "7071:7071"
    environment:
      SERVICE_URL: "service:jmx:rmi:///jndi/rmi://kafka:9101/jmxrmi"
    volumes:
      - ./kafka-jmx/config.yml:/opt/bitnami/jmx-exporter/config.yml  # 👈 путь исправлен
    command: [ "7071", "/opt/bitnami/jmx-exporter/config.yml" ]
    depends_on:
      - kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [geo-network]
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks: [geo-network]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [geo-network]
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    networks: [geo-network]
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./clickhouse-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  filter-service:
    build:
      context: ../geo-ingest/filter-service
      dockerfile: Dockerfile
    container_name: filter-service
    networks: [geo-network]
    ports:
      - "8080:8080"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    labels:
      - "logging=promtail"
    depends_on:
      - kafka

  deduplication-service:
    build:
      context: ../geo-ingest/deduplication-service
      dockerfile: Dockerfile
    container_name: deduplication-service
    networks: [geo-network]
    ports:
      - "8081:8080"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    labels:
      - "logging=promtail"
    depends_on:
      - kafka
      - redis

  enrichment-service:
    build:
      context: ../geo-ingest/enrichment-service
      dockerfile: Dockerfile
    container_name: enrichment-service
    networks: [geo-network]
    ports:
      - "8082:8080"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    labels:
      - "logging=promtail"
    depends_on:
      - kafka
      - redis

  geo-processor:
    build:
      context: ../geo-processor
      dockerfile: Dockerfile
    container_name: geo-processor
    networks: [geo-network]
    ports:
      - "8083:8080"
    environment:
      - GEO_PROCESSOR_EVICTION_IDLE_TIMEOUT=5m
      - GEO_PROCESSOR_EVICTION_RUN_INTERVAL=5m
      - GEO_PROCESSOR_LKL_TTL=1d
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
    labels:
      - "logging=promtail"
    depends_on:
      - kafka
      - postgres
      - redis
      - clickhouse

  geo-api:
    build:
      context: ../geo-api
      dockerfile: Dockerfile
    container_name: geo-api
    networks: [geo-network]
    ports:
      - "8084:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    labels:
      - "logging=promtail"
    depends_on:
      - postgres
      - redis
      - clickhouse

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    networks: [geo-network]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    networks: [geo-network]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.45.1
    container_name: prometheus
    networks: [geo-network]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    networks: [geo-network]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki